[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
[INPUT]
    Name         tail
    Path         /logs/simulated.log
    Refresh_Interval 5
    Tag          simulated.log
    Parser       json

[FILTER]
    Name    stdout
    Match   *

[OUTPUT]
    Name         kafka
    Match        *
    Brokers      kafka:9092
    Topics       threat-logs
